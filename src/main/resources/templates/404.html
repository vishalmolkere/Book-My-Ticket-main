<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found - BookMyTicket</title>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- Google Font -->
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a; /* dark slate */
	--bg-card: #111827; /* card background */
	--border-soft: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #e74c3c;
	--accent-hover: #d63b2c;
}

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-main);
}

/* Error Container */
.error-container {
	display: flex;
	justify-content: center;
	align-items: center;
	min-height: 100vh;
	padding: 20px;
}

/* Error Box */
.error-box {
	width: 100%;
	max-width: 620px;
	padding: 70px 45px;
	background: linear-gradient(180deg, #111827 0%, #0b1220 100%);
	border-radius: 16px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 0 0 1px
		rgba(255, 255, 255, 0.02);
	text-align: center;
	animation: fadeInUp 0.6s ease;
}

/* Icon */
.error-icon {
	font-size: 4.2rem;
	margin-bottom: 22px;
	filter: drop-shadow(0 0 12px rgba(231, 76, 60, 0.4));
}

/* Error Code */
.error-code {
	font-size: 5.2rem;
	font-weight: 900;
	color: var(--accent);
	line-height: 1;
	margin-bottom: 18px;
	letter-spacing: 2px;
}

/* Title */
.error-title {
	font-size: 1.9rem;
	font-weight: 700;
	color: #f9fafb;
	margin-bottom: 16px;
}

/* Description */
.error-description {
	font-size: 1rem;
	color: var(--text-muted);
	margin-bottom: 45px;
	line-height: 1.7;
}

/* Button */
.btn-home {
	background: linear-gradient(135deg, var(--accent), #ff6b5a);
	color: #fff !important;
	text-decoration: none;
	padding: 0.85rem 2.2rem;
	border-radius: 10px;
	font-weight: 600;
	font-size: 0.95rem;
	letter-spacing: 0.4px;
	transition: all 0.3s ease;
	display: inline-block;
	border: none;
}

.btn-home:hover {
	background: linear-gradient(135deg, var(--accent-hover), var(--accent));
	transform: translateY(-3px);
	box-shadow: 0 10px 25px rgba(231, 76, 60, 0.35);
}

/* Animations */
@keyframes fadeInUp {from { opacity:0;
	transform: translateY(25px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}

/* Responsive */
@media ( max-width : 768px) {
	.error-box {
		padding: 55px 30px;
	}
	.error-code {
		font-size: 4.2rem;
	}
	.error-title {
		font-size: 1.6rem;
	}
}

@media ( max-width : 480px) {
	.error-box {
		padding: 45px 24px;
	}
	.error-code {
		font-size: 3.6rem;
	}
	.error-title {
		font-size: 1.4rem;
	}
	.error-description {
		font-size: 0.95rem;
	}
}
</style>
</head>

<body>

	<div class="error-container">
		<div class="error-box">

			<div class="error-icon">🎬</div>

			<div class="error-code">404</div>

			<h1 class="error-title">Page Not Found</h1>

			<p class="error-description">
				Sorry! The page you're looking for doesn't exist or has been moved.<br>
				Let’s get you back to the main event 🎥
			</p>

			<a href="/" class="btn-home">← Back to Home</a>

		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
