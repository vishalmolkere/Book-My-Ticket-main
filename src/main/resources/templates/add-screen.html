<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Screen - BookMyTicket Admin</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border-soft: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #e74c3c;
	--accent-2: #f59e0b;
	--danger: #ef4444;
}

* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-main);
	padding: 20px;
}

.form-container {
	width: 100%;
	display: flex;
	justify-content: center;
	align-items: center;
}

.form-box {
	width: 100%;
	max-width: 440px;
	padding: 40px;
	background: linear-gradient(180deg, #111827, #0b1220);
	border-radius: 18px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
	animation: fadeInUp 0.6s ease;
}

h2 {
	text-align: center;
	margin-bottom: 30px;
	font-weight: 800;
	font-size: 1.8rem;
	letter-spacing: 0.4px;
}

.form-group {
	margin-bottom: 22px;
}

label {
	display: block;
	margin-bottom: 6px;
	font-weight: 600;
	font-size: 0.9rem;
}

.form-control {
	background: #020617;
	border: 1px solid var(--border-soft);
	border-radius: 10px;
	padding: 11px 14px;
	font-size: 0.9rem;
	color: var(--text-main);
	transition: all 0.25s ease;
}

.form-control::placeholder {
	color: var(--text-muted);
}

.form-control:focus {
	background: #020617;
	border-color: var(--accent);
	box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.25);
	outline: none;
}

.error-text {
	color: var(--danger);
	font-size: 0.8rem;
	margin-top: 5px;
	font-weight: 600;
}

.btn-submit {
	width: 100%;
	background: linear-gradient(135deg, var(--accent), #ff6b5a);
	border: none;
	color: white;
	font-weight: 600;
	padding: 12px;
	border-radius: 10px;
	font-size: 0.95rem;
	transition: all 0.25s ease;
	margin-top: 10px;
}

.btn-submit:hover {
	transform: translateY(-2px);
	box-shadow: 0 12px 30px rgba(231, 76, 60, 0.45);
}

.back-link {
	text-align: center;
	margin-top: 22px;
}

.back-link a {
	color: var(--text-muted);
	font-weight: 600;
	text-decoration: none;
	transition: all 0.25s ease;
}

.back-link a:hover {
	color: var(--accent);
}

@keyframes fadeInUp {from { opacity:0;
	transform: translateY(25px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}
@media ( max-width : 768px) {
	.form-box {
		padding: 30px;
	}
	h2 {
		font-size: 1.5rem;
	}
}
</style>
</head>

<body>

	<div class="form-container">
		<div class="form-box">

			<h2>🎬 Add Screen</h2>

			<form action="/add-screen" method="post" th:object="${screenDto}">

				<input type="hidden" th:field="*{theaterId}">

				<div class="form-group">
					<label>Screen Name</label> <input th:field="*{name}"
						class="form-control" placeholder="Screen 1, IMAX">
					<div class="error-text" th:errors="*{name}"></div>
				</div>

				<div class="form-group">
					<label>Screen Type</label> <input th:field="*{type}"
						class="form-control" placeholder="2D, 3D, IMAX">
					<div class="error-text" th:errors="*{type}"></div>
				</div>

				<button type="submit" class="btn-submit">Add Screen</button>

				<div class="back-link">
					<a href="/manage-theaters">← Back to Theaters</a>
				</div>

			</form>

		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
