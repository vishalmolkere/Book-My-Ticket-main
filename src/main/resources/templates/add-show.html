<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Show - BookMyTicket Admin</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">

<!-- Google Font -->
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border-soft: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #e74c3c;
	--accent-2: #22c55e;
}

* {
	box-sizing: border-box;
}

body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-main);
	padding: 20px;
}

/* Container */
.form-container {
	width: 100%;
	max-width: 500px;
}

/* Card */
.form-card {
	background: linear-gradient(180deg, #111827, #0b1220);
	border-radius: 18px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
	padding: 40px;
	animation: fadeInUp 0.6s ease;
}

/* Heading */
.form-card h1 {
	text-align: center;
	font-weight: 800;
	font-size: 1.6rem;
	margin-bottom: 30px;
	letter-spacing: 0.4px;
}

/* Form Group */
.form-group {
	margin-bottom: 22px;
}

label {
	font-weight: 600;
	font-size: 0.9rem;
	margin-bottom: 6px;
	display: block;
	color: var(--text-main);
}

/* Inputs */
.form-control, .form-select {
	background: #020617;
	border: 1px solid var(--border-soft);
	color: var(--text-main);
	border-radius: 10px;
	padding: 10px 14px;
	font-size: 0.9rem;
	transition: all 0.25s ease;
}

.form-control:focus, .form-select:focus {
	border-color: var(--accent);
	box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.25);
	outline: none;
	background: #020617;
	color: var(--text-main);
}

.form-control::placeholder {
	color: var(--text-muted);
}

/* Error text */
.error-text {
	color: #f87171;
	font-size: 0.8rem;
	font-weight: 600;
	margin-top: 4px;
	display: block;
}

/* Button */
.btn-submit {
	width: 100%;
	background: linear-gradient(135deg, #e74c3c, #ff6b6b);
	border: none;
	color: white;
	font-weight: 700;
	padding: 12px;
	border-radius: 12px;
	font-size: 0.95rem;
	transition: all 0.25s ease;
	margin-top: 10px;
}

.btn-submit:hover {
	transform: translateY(-2px);
	box-shadow: 0 14px 35px rgba(231, 76, 60, 0.45);
}

/* Animations */
@keyframes fadeInUp {from { opacity:0;
	transform: translateY(20px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}
@media ( max-width : 480px) {
	.form-card {
		padding: 30px 25px;
	}
}
</style>
</head>

<body>

	<div class="form-container">
		<div class="form-card">

			<h1>🎥 Add Show</h1>

			<form action="/add-show" method="post" th:object="${showDto}">

				<input type="hidden" th:field="*{screenId}">

				<div class="form-group">
					<label>Show Date</label> <input type="date" class="form-control"
						th:field="*{showDate}"> <span class="error-text"
						th:errors="*{showDate}"></span>
				</div>

				<div class="form-group">
					<label>Show Start Time</label> <input type="time"
						class="form-control" th:field="*{startTime}"> <span
						class="error-text" th:errors="*{startTime}"></span>
				</div>

				<div class="form-group">
					<label>Select Movie</label> <select class="form-select"
						th:field="*{movieId}">
						<option value="">-- Select Movie --</option>
						<option th:each="movie : ${movies}" th:value="${movie.id}"
							th:text="${movie.name}"></option>
					</select> <span class="error-text" th:errors="*{movieId}"></span>
				</div>

				<div class="form-group">
					<label>Ticket Price (₹)</label> <input type="number"
						class="form-control" th:field="*{ticketPrice}"
						placeholder="e.g. 250"> <span class="error-text"
						th:errors="*{ticketPrice}"></span>
				</div>

				<button type="submit" class="btn-submit">Add Show</button>

			</form>

		</div>
	</div>

</body>
</html>
