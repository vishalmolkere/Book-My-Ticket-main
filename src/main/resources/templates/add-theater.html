<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Theater - BookMyTicket Admin</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border-soft: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #e74c3c;
}

* {
	box-sizing: border-box;
}

body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-main);
	padding: 20px;
}

/* Container */
.form-container {
	width: 100%;
	max-width: 480px;
}

/* Card */
.form-box {
	background: linear-gradient(180deg, #111827, #0b1220);
	border-radius: 20px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
	padding: 45px;
	animation: fadeInUp 0.6s ease;
}

/* Heading */
h2 {
	text-align: center;
	margin-bottom: 30px;
	font-weight: 800;
	font-size: 1.6rem;
	letter-spacing: 0.4px;
}

/* Form group */
.form-group {
	margin-bottom: 22px;
}

label {
	display: block;
	margin-bottom: 6px;
	font-weight: 600;
	font-size: 0.9rem;
	color: var(--text-main);
}

/* Inputs */
.form-control, .form-file {
	background: #020617;
	border: 1px solid var(--border-soft);
	border-radius: 10px;
	padding: 11px 14px;
	font-size: 0.9rem;
	color: var(--text-main);
	transition: all 0.25s ease;
}

.form-control::placeholder {
	color: var(--text-muted);
}

.form-control:focus, .form-file:focus {
	border-color: var(--accent);
	box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.25);
	outline: none;
	background: #020617;
	color: var(--text-main);
}

/* File input button */
.form-file::file-selector-button {
	background: linear-gradient(135deg, #e74c3c, #ff6b6b);
	color: white;
	border: none;
	padding: 6px 14px;
	border-radius: 8px;
	font-weight: 600;
	cursor: pointer;
	margin-right: 10px;
}

/* Errors */
.error-text {
	color: #f87171;
	font-size: 0.8rem;
	font-weight: 600;
	margin-top: 4px;
	display: block;
}

/* Submit button */
.btn-submit {
	width: 100%;
	background: linear-gradient(135deg, #e74c3c, #ff6b6b);
	border: none;
	color: white;
	font-weight: 700;
	padding: 12px;
	border-radius: 12px;
	font-size: 0.95rem;
	transition: all 0.25s ease;
	margin-top: 10px;
}

.btn-submit:hover {
	transform: translateY(-2px);
	box-shadow: 0 14px 35px rgba(231, 76, 60, 0.45);
}

/* Back link */
.back-link {
	text-align: center;
	margin-top: 18px;
}

.back-link a {
	color: var(--text-muted);
	font-weight: 600;
	text-decoration: none;
	transition: all 0.25s ease;
}

.back-link a:hover {
	color: white;
}

/* Animations */
@keyframes fadeInUp {from { opacity:0;
	transform: translateY(20px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}
@media ( max-width : 480px) {
	.form-box {
		padding: 30px 25px;
	}
}
</style>
</head>

<body>

	<div class="form-container">
		<div class="form-box">

			<h2>🏛️ Add Theater</h2>

			<form action="/add-theater" method="post"
				enctype="multipart/form-data" th:object="${theaterDto}">

				<div class="form-group">
					<label>Theater Name</label> <input type="text" th:field="*{name}"
						class="form-control" placeholder="Enter theater name"> <span
						class="error-text" th:errors="*{name}"></span>
				</div>

				<div class="form-group">
					<label>Address</label> <input type="text" th:field="*{address}"
						class="form-control" placeholder="Enter theater address">
					<span class="error-text" th:errors="*{address}"></span>
				</div>

				<div class="form-group">
					<label>Location Link</label> <input type="text"
						th:field="*{locationLink}" class="form-control"
						placeholder="Google Maps link"> <span class="error-text"
						th:errors="*{locationLink}"></span>
				</div>

				<div class="form-group">
					<label>Theater Image</label> <input type="file" th:field="*{image}"
						class="form-file" accept="image/*"> <span
						class="error-text" th:errors="*{image}"></span>
				</div>

				<button type="submit" class="btn-submit">Add Theater</button>

				<div class="back-link">
					<a href="/manage-theaters">← Back to Theaters</a>
				</div>

			</form>

		</div>
	</div>

</body>
</html>
