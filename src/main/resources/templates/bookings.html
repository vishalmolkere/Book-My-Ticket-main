<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings | BookMyTicket</title>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border-soft: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #6496ff;
	--accent-pink: #ff4081;
}

body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	color: var(--text-main);
	padding-bottom: 50px;
}

/* Navbar */
.navbar {
	background: rgba(17, 24, 39, 0.8) !important;
	backdrop-filter: blur(10px);
	border-bottom: 1px solid var(--border-soft);
	padding: 1rem 2rem;
}

.navbar-brand {
	font-weight: 900;
	font-size: 1.5rem;
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}

/* Header */
.page-header {
	padding: 60px 0 40px;
	text-align: center;
}

.page-header h1 {
	font-size: 2.5rem;
	font-weight: 900;
	margin-bottom: 15px;
}

.page-header p {
	color: var(--text-muted);
}

/* Booking Card */
.booking-card {
	background: linear-gradient(180deg, #111827, #0b1220);
	border: 1px solid var(--border-soft);
	border-radius: 20px;
	padding: 25px;
	margin-bottom: 25px;
	transition: all 0.3s ease;
	display: flex;
	justify-content: space-between;
	align-items: center;
	box-shadow: 0 20px 45px rgba(0, 0, 0, 0.5);
}

.booking-card:hover {
	transform: perspective(1000px) scale(1.01) translateZ(10px);
	border-color: var(--accent);
}

.booking-details h3 {
	font-weight: 800;
	font-size: 1.4rem;
	margin-bottom: 8px;
}

.booking-meta {
	display: flex;
	gap: 20px;
	color: var(--text-muted);
	font-size: 0.9rem;
	margin-bottom: 15px;
}

.booking-meta i {
	margin-right: 5px;
}

.booking-seats {
	display: flex;
	gap: 8px;
}

.seat-tag {
	background: rgba(100, 150, 255, 0.15);
	color: var(--accent);
	padding: 4px 12px;
	border-radius: 8px;
	font-weight: 700;
	font-size: 0.75rem;
	border: 1px solid rgba(100, 150, 255, 0.3);
}

.booking-actions .btn-view {
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	color: white;
	border: none;
	padding: 10px 24px;
	border-radius: 12px;
	font-weight: 700;
	text-decoration: none;
	transition: all 0.3s ease;
	display: inline-block;
}

.booking-actions .btn-view:hover {
	transform: translateY(-2px);
	box-shadow: 0 10px 25px rgba(100, 150, 255, 0.4);
}

/* Empty State */
.empty-bookings {
	text-align: center;
	padding: 100px 0;
}

.empty-bookings h2 {
	font-weight: 800;
	font-size: 2rem;
	margin-bottom: 20px;
	color: var(--text-muted);
}

.btn-browse {
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	color: white;
	padding: 14px 34px;
	border-radius: 14px;
	font-weight: 700;
	text-decoration: none;
	display: inline-block;
	margin-top: 20px;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.booking-card { animation: fadeIn 0.5s ease backwards; }

</style>
</head>

<body>

	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg">
		<div class="container">
			<a class="navbar-brand" href="/">🎬 BookMyTicket</a>
			<div class="collapse navbar-collapse justify-content-end">
				<a href="/" class="btn btn-outline-light me-2">Home</a>
				<a href="/profile" class="btn btn-outline-light me-2">Profile</a>
				<a href="/logout" class="btn btn-danger">Logout</a>
			</div>
		</div>
	</nav>

	<div class="container">
		<header class="page-header">
			<h1>My Bookings</h1>
			<p>Access and view all your movie ticket history here.</p>
		</header>

		<div class="bookings-list" th:if="${!bookings.isEmpty()}">
			
			<div th:each="booking, iter : ${bookings}" class="booking-card" 
				 th:style="'animation-delay: ' + (${iter.index} * 0.1) + 's'">
				
				<div class="booking-details">
					<h3 th:text="${booking.movieName}">Movie Name</h3>
					<div class="booking-meta">
						<span>🏛️ <span th:text="${booking.theaterName}">Theater Name</span></span>
						<span>🖥️ <span th:text="${booking.screenName}">Screen Name</span></span>
					</div>
					<div class="booking-meta">
						<span>📅 <span th:text="${booking.showDate}">2023-11-20</span></span>
						<span>⏰ <span th:text="${booking.showTiming}">18:00</span></span>
					</div>
					<div class="booking-seats">
						<span th:each="seat : ${booking.seatNumber}" class="seat-tag" th:text="${seat}">A1</span>
					</div>
				</div>

				<div class="booking-actions">
					<a th:href="'/view-ticket/' + ${booking.id}" class="btn-view">View Ticket</a>
				</div>

			</div>

		</div>

		<!-- Empty State -->
		<div class="empty-bookings" th:if="${bookings.isEmpty()}">
			<h2>No Bookings Found!</h2>
			<p>You haven't booked any movies yet. Ready for the big screen?</p>
			<a href="/" class="btn-browse">Browse Movies Now</a>
		</div>

	</div>

</body>
</html>
