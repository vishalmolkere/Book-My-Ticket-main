<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Theater & Show | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border-soft: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #e74c3c;
}

body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	color: var(--text-main);
	padding: 30px 15px;
}

/* Theater Card */
.theater-card {
	background: linear-gradient(180deg, #111827, #0b1220);
	border: 1px solid var(--border-soft);
	border-radius: 18px;
	padding: 25px;
	margin-bottom: 25px;
	box-shadow: 0 25px 50px rgba(0, 0, 0, 0.55);
	animation: fadeInUp 0.6s ease;
}

/* Theater Name */
.theater-name {
	font-size: 1.5rem;
	font-weight: 900;
	margin-bottom: 15px;
	display: flex;
	align-items: center;
	gap: 8px;
}

/* Show Buttons */
.show-time {
	display: inline-block;
	margin: 6px;
	padding: 10px 18px;
	border-radius: 12px;
	font-weight: 700;
	font-size: 0.9rem;
	text-decoration: none;
	color: var(--accent);
	border: 2px solid var(--accent);
	transition: all 0.25s ease;
}

.show-time:hover {
	background: var(--accent);
	color: white;
	transform: translateY(-2px);
	box-shadow: 0 12px 35px rgba(231, 76, 60, 0.55);
}

/* No Shows */
.no-shows {
	color: var(--text-muted);
	font-style: italic;
}

/* Animation */
@
keyframes fadeInUp {from { opacity:0;
	transform: translateY(20px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}
@media ( max-width : 768px) {
	.theater-name {
		font-size: 1.3rem;
	}
	.show-time {
		padding: 8px 14px;
		font-size: 0.85rem;
	}
}
</style>
</head>

<body>

	<div class="container">

		<h2 class="fw-bold mb-4 text-center">🎭 Select Theater & Show</h2>

		<!-- THEATERS -->
		<div th:each="theater : ${theaters.keySet()}">

			<div class="theater-card">

				<div class="theater-name">
					🏛️ <span th:text="${theater.name}"></span>
				</div>

				<div>
					<span class="text-muted me-2">Shows:</span> <span
						th:if="${theaters.get(theater).isEmpty()}" class="no-shows">
						No shows available </span> <a th:each="show : ${theaters.get(theater)}"
						th:href="'/show-seats/' + ${show.id}" class="show-time"
						th:text="${show.startTime}"> </a>
				</div>

			</div>

		</div>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
