<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Theater | BookMyTicket Admin</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border-soft: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #6496ff;
	--accent-pink: #ff4081;
}

body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-main);
	padding: 20px;
}

/* Container */
.form-container {
	width: 100%;
	display: flex;
	justify-content: center;
}

/* Card */
.form-box {
	width: 100%;
	max-width: 500px;
	padding: 40px;
	background: linear-gradient(180deg, #111827, #0b1220);
	border-radius: 18px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
	animation: fadeInUp 0.6s ease;
}

/* Heading */
h2 {
	text-align: center;
	margin-bottom: 28px;
	font-weight: 900;
	font-size: 1.6rem;
}

/* Form Group */
.form-group {
	margin-bottom: 22px;
}

label {
	margin-bottom: 8px;
	font-weight: 600;
	color: var(--text-muted);
	font-size: 0.9rem;
}

/* Inputs */
.form-control, .form-file {
	background: #020617;
	border: 1.5px solid var(--border-soft);
	border-radius: 12px;
	padding: 12px 16px;
	color: var(--text-main);
	font-size: 0.95rem;
	transition: all 0.25s ease;
	width: 100%;
}

.form-control::placeholder {
	color: #64748b;
}

.form-control:focus, .form-file:focus {
	background: #020617;
	border-color: var(--accent);
	box-shadow: 0 0 0 3px rgba(100, 150, 255, 0.25);
	color: var(--text-main);
}

/* File Button */
.form-file::file-selector-button {
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	color: white;
	border: none;
	padding: 8px 14px;
	border-radius: 8px;
	font-weight: 600;
	cursor: pointer;
	margin-right: 10px;
}

/* Error */
.error-text {
	color: var(--accent-pink);
	font-size: 0.8rem;
	margin-top: 4px;
	font-weight: 600;
}

/* Image Preview */
.image-preview {
	text-align: center;
	margin-bottom: 20px;
}

.image-preview img {
	max-width: 100%;
	max-height: 200px;
	border-radius: 14px;
	border: 2px solid var(--border-soft);
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
}

.image-note {
	font-size: 0.8rem;
	color: var(--text-muted);
	margin-top: 8px;
	font-style: italic;
}

/* Button */
.btn-submit {
	width: 100%;
	margin-top: 10px;
	padding: 12px;
	border-radius: 12px;
	border: none;
	font-weight: 700;
	font-size: 0.95rem;
	color: white;
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	transition: all 0.3s ease;
}

.btn-submit:hover {
	transform: translateY(-2px);
	box-shadow: 0 15px 35px rgba(100, 150, 255, 0.45);
}

/* Back Link */
.back-link {
	text-align: center;
	margin-top: 20px;
}

.back-link a {
	color: var(--text-muted);
	font-weight: 600;
	text-decoration: none;
	transition: color 0.2s ease;
}

.back-link a:hover {
	color: var(--accent-pink);
}

/* Animation */
@
keyframes fadeInUp {from { opacity:0;
	transform: translateY(20px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}
@media ( max-width : 480px) {
	.form-box {
		padding: 30px;
	}
	h2 {
		font-size: 1.4rem;
	}
}
</style>
</head>

<body>

	<div class="form-container">
		<div class="form-box">

			<h2>✏️ Edit Theater</h2>

			<form action="/update-theater" method="post"
				enctype="multipart/form-data" th:object="${theaterDto}">

				<input type="hidden" name="id" th:value="${id}">

				<div class="form-group">
					<label>Theater Name</label> <input type="text" th:field="*{name}"
						class="form-control" placeholder="Enter theater name">
					<div class="error-text" th:errors="*{name}"></div>
				</div>

				<div class="form-group">
					<label>Address</label> <input type="text" th:field="*{address}"
						class="form-control" placeholder="Enter theater address">
					<div class="error-text" th:errors="*{address}"></div>
				</div>

				<div class="form-group">
					<label>Location Link</label> <input type="text"
						th:field="*{locationLink}" class="form-control"
						placeholder="Google Maps link">
					<div class="error-text" th:errors="*{locationLink}"></div>
				</div>

				<div class="image-preview">
					<img th:src="${imageLink}" alt="Theater Image">
					<p class="image-note">Current theater image</p>
				</div>

				<div class="form-group">
					<label>Update Image (Optional)</label> <input type="file"
						th:field="*{image}" class="form-file" accept="image/*">
					<p class="image-note">Leave empty to keep current image</p>
					<div class="error-text" th:errors="*{image}"></div>
				</div>

				<button type="submit" class="btn-submit">Update Theater</button>

				<div class="back-link">
					<a href="/manage-theaters">← Back to Theaters</a>
				</div>

			</form>

		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
