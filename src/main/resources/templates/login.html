<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border-soft: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #6496ff;
	--accent-pink: #ff4081;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	color: var(--text-main);
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 20px;
}

/* ===== LOGIN CARD ===== */
.login-box {
	width: 100%;
	max-width: 420px;
	padding: 40px;
	background: linear-gradient(180deg, #111827, #0b1220);
	border-radius: 18px;
	border: 1px solid var(--border-soft);
	box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
	animation: fadeInUp 0.6s ease;
	text-align: center;
}

/* ===== TITLE ===== */
.login-box h3 {
	font-weight: 900;
	font-size: 1.8rem;
	margin-bottom: 10px;
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}

.login-box p {
	color: var(--text-muted);
	font-size: 0.95rem;
	margin-bottom: 26px;
}

/* ===== INPUTS ===== */
.form-control {
	background: #020617;
	border: 1.5px solid var(--border-soft);
	border-radius: 12px;
	padding: 12px 16px;
	color: var(--text-main);
	font-weight: 500;
	transition: all 0.25s ease;
}

.form-control::placeholder {
	color: #64748b;
}

.form-control:focus {
	background: #020617;
	border-color: var(--accent);
	box-shadow: 0 0 0 3px rgba(100, 150, 255, 0.25);
	color: var(--text-main);
}

/* ===== CHECKBOX ===== */
.form-check-label {
	color: var(--text-muted);
	font-weight: 500;
}

.form-check-input {
	accent-color: var(--accent-pink);
}

/* ===== BUTTON ===== */
.btn-primary {
	width: 100%;
	padding: 12px;
	border-radius: 12px;
	border: none;
	font-weight: 700;
	font-size: 0.95rem;
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	box-shadow: 0 15px 35px rgba(100, 150, 255, 0.35);
	transition: all 0.3s ease;
}

.btn-primary:hover {
	transform: translateY(-2px);
	box-shadow: 0 20px 45px rgba(100, 150, 255, 0.5);
}

/* ===== LINKS ===== */
a {
	color: var(--accent);
	font-weight: 600;
	text-decoration: none;
}

a:hover {
	color: var(--accent-pink);
}

/* ===== TOASTS ===== */
.toastify-container {
	position: fixed;
	top: 20px;
	right: 20px;
	z-index: 9999;
}

.toastify {
	min-width: 300px;
	max-width: 420px;
	border-radius: 12px;
	padding: 14px 18px;
	color: white;
	font-weight: 600;
	display: flex;
	align-items: center;
	gap: 12px;
	box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
	animation: toastSlideIn 0.4s ease forwards;
}

.toastify.success {
	background: linear-gradient(135deg, #22c55e, #16a34a);
}

.toastify.error {
	background: linear-gradient(135deg, #ff4081, #ff6a6a);
}

.toastify span {
	flex: 1;
}

.toastify-close {
	width: 26px;
	height: 26px;
	border-radius: 50%;
	background: rgba(255, 255, 255, 0.25);
	border: none;
	color: white;
	font-size: 1.1rem;
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
}

@
keyframes toastSlideIn {from { opacity:0;
	transform: translateX(400px);
}

to {
	opacity: 1;
	transform: translateX(0);
}

}
@
keyframes toastSlideOut {from { opacity:1;
	transform: translateX(0);
}

to {
	opacity: 0;
	transform: translateX(400px);
}

}
@
keyframes fadeInUp {from { opacity:0;
	transform: translateY(20px);
}

to {
	opacity: 1;
	transform: translateY(0);
}

}
@media ( max-width : 480px) {
	.login-box {
		padding: 30px;
	}
}
</style>
</head>

<body>

	<!-- TOASTS -->
	<div class="toastify-container">
		<div th:if="${pass}" class="toastify success">
			<span th:text="${pass}"></span>
		</div>
		<div th:if="${fail}" class="toastify error">
			<span th:text="${fail}"></span>
		</div>
	</div>

	<!-- LOGIN CARD -->
	<div class="login-box">
		<h3>Welcome Back</h3>
		<p>Sign in to continue booking</p>

		<form action="/login" method="post">
			<div class="mb-3">
				<input type="email" name="email" class="form-control"
					placeholder="📧 Email address" required>
			</div>

			<div class="mb-3">
				<input type="password" name="password" class="form-control"
					placeholder="🔒 Password" required>
			</div>

			<div class="mb-3 form-check text-start">
				<input type="checkbox" class="form-check-input" id="remember">
				<label class="form-check-label" for="remember">Remember me</label>
			</div>

			<button class="btn btn-primary">Sign In</button>
		</form>

		<div class="mt-4">
			<a href="/forgot-password">Forgot Password?</a><br> <span
				class="text-muted">New here?</span> <a href="/register">Create
				account</a>
		</div>
	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

	<script>
document.addEventListener("DOMContentLoaded", () => {
	document.querySelectorAll('.toastify').forEach(t => {
		const btn = document.createElement('button');
		btn.className = 'toastify-close';
		btn.innerHTML = '×';
		t.appendChild(btn);

		btn.onclick = () => {
			t.style.animation = 'toastSlideOut 0.3s ease forwards';
			setTimeout(() => t.remove(), 300);
		};

		setTimeout(() => {
			if (document.body.contains(t)) {
				t.style.animation = 'toastSlideOut 0.3s ease forwards';
				setTimeout(() => t.remove(), 300);
			}
		}, 3500);
	});
});
</script>

</body>
</html>
