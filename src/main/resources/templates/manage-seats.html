<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Manage Seats | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--standard: #60a5fa;
	--premium: #fbbf24;
	--vip: #f87171;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	color: var(--text-main);
	min-height: 100vh;
}

.container {
	max-width: 1200px;
	margin-top: 50px;
}

/* ===== SCREEN ===== */
.screen-label {
	text-align: center;
	font-weight: 900;
	margin-bottom: 40px;
	padding: 14px;
	letter-spacing: 3px;
	border-radius: 20px;
	background: linear-gradient(180deg, #1e293b, #020617);
	border: 1px solid var(--border);
	box-shadow: 0 25px 60px rgba(0, 0, 0, .8);
	color: #c7d2fe;
}

/* ===== ROW ===== */
.row-wrapper {
	display: flex;
	align-items: center;
	margin-bottom: 14px;
}

.row-name {
	width: 60px;
	font-weight: 700;
	color: var(--text-muted);
}

/* ===== SEATS ===== */
.seat {
	width: 38px;
	height: 38px;
	border-radius: 10px;
	margin: 4px;
	display: flex;
	align-items: center;
	justify-content: center;
	font-size: .75rem;
	font-weight: 700;
	cursor: default;
	box-shadow: inset 0 -2px 0 rgba(0, 0, 0, .3);
	transition: all .25s ease;
}

/* Seat Types */
.STANDARD {
	background: rgba(96, 165, 250, .2);
	border: 1px solid var(--standard);
	color: var(--standard);
}

.PREMIUM {
	background: rgba(251, 191, 36, .2);
	border: 1px solid var(--premium);
	color: var(--premium);
}

.VIP {
	background: rgba(248, 113, 113, .2);
	border: 1px solid var(--vip);
	color: var(--vip);
}

/* Hover effect (visual only) */
.seat:hover {
	transform: translateY(-2px);
	box-shadow: 0 10px 25px rgba(0, 0, 0, .6);
}

/* ===== ACTIONS ===== */
.actions {
	margin-top: 40px;
	display: flex;
	justify-content: flex-end;
	gap: 12px;
}

.btn-back {
	background: #020617;
	border: 1px solid var(--border);
	color: var(--text-muted);
	padding: .6rem 1.4rem;
	border-radius: 12px;
	font-weight: 600;
}

.btn-back:hover {
	color: #fff;
	border-color: #334155;
}

/* ===== EMPTY STATE ===== */
.empty-state {
	text-align: center;
	padding: 80px 30px;
	background: linear-gradient(180deg, #111827, #0b1220);
	border-radius: 20px;
	border: 1px solid var(--border);
	box-shadow: 0 30px 70px rgba(0, 0, 0, .7);
}

.empty-state h3 {
	font-weight: 900;
	margin-bottom: 10px;
}

.empty-state p {
	color: var(--text-muted);
	margin-bottom: 25px;
}

.btn-create {
	background: linear-gradient(135deg, #6496ff, #ff4081);
	color: #fff;
	font-weight: 700;
	padding: .75rem 1.8rem;
	border-radius: 14px;
	box-shadow: 0 15px 35px rgba(100, 150, 255, .45);
}

.btn-create:hover {
	transform: translateY(-3px);
	box-shadow: 0 25px 55px rgba(100, 150, 255, .6);
	color: #fff;
}

/* ===== RESPONSIVE ===== */
@media ( max-width :768px) {
	.row-name {
		width: 45px;
		font-size: .85rem
	}
	.seat {
		width: 34px;
		height: 34px
	}
}
</style>
</head>

<body>

	<div class="container">

		<!-- ================= NO SEATS ================= -->
		<div th:if="${#maps.isEmpty(seatsByRow)}" class="empty-state">
			<h3>🎟️ No Seat Layout Found</h3>
			<p>This screen does not have a seat layout yet.</p>

			<a th:href="@{/add-seats/{id}(id=${screenId})}"
				class="btn btn-create">+ Create Seat Layout</a>
		</div>

		<!-- ================= SEATS EXIST ================= -->
		<div th:if="${!#maps.isEmpty(seatsByRow)}">

			<div class="screen-label">🎬 SCREEN THIS SIDE 🎬</div>

			<!-- ROWS -->
			<div th:each="rowEntry : ${seatsByRow}">
				<div class="row-wrapper">
					<div class="row-name" th:text="${rowEntry.key}"></div>

					<div class="d-flex flex-wrap">
						<div th:each="seat : ${rowEntry.value}" class="seat"
							th:classappend="${seat.category}" th:text="${seat.seatColumn}">
						</div>
					</div>
				</div>
			</div>

			<!-- ACTIONS -->
			<div class="actions">
				<a href="/manage-theaters" class="btn-back">← Back</a>
			</div>

		</div>

	</div>

</body>
</html>
