<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Theaters | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #6496ff;
	--pink: #ff4081;
	--danger: #ff4d6d;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	color: var(--text-main);
	min-height: 100vh;
}

/* ===== NAVBAR ===== */
.navbar {
	background: #020617;
	border-bottom: 1px solid var(--border);
	padding: 1rem 2rem;
}

.navbar-brand {
	font-weight: 900;
	font-size: 1.4rem;
	background: linear-gradient(135deg, var(--accent), var(--pink));
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}

.nav-link {
	color: var(--text-muted) !important;
	font-weight: 500;
}

.nav-link:hover {
	color: var(--accent) !important;
}

/* ===== CONTAINER ===== */
.admin-container {
	max-width: 1400px;
	margin: 50px auto;
	padding: 0 20px;
}

/* ===== HEADER ===== */
.admin-header {
	display: flex;
	justify-content: space-between;
	align-items: center;
	flex-wrap: wrap;
	gap: 20px;
	margin-bottom: 40px;
}

.admin-header h1 {
	font-weight: 900;
	font-size: 1.9rem;
}

.add-btn {
	background: linear-gradient(135deg, var(--accent), var(--pink));
	color: white;
	font-weight: 700;
	padding: .7rem 1.8rem;
	border-radius: 14px;
	box-shadow: 0 15px 35px rgba(100, 150, 255, .45);
	text-decoration: none;
}

.add-btn:hover {
	transform: translateY(-2px);
	box-shadow: 0 25px 55px rgba(100, 150, 255, .6);
	color: white;
}

/* ===== GRID ===== */
.theaters-grid {
	display: grid;
	grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
	gap: 30px;
}

/* ===== CARD ===== */
.theater-card {
	background: linear-gradient(180deg, #111827, #0b1220);
	border: 1px solid var(--border);
	border-radius: 18px;
	overflow: hidden;
	box-shadow: 0 30px 70px rgba(0, 0, 0, .7);
	transition: .35s;
}

.theater-card:hover {
	transform: translateY(-10px);
	box-shadow: 0 45px 90px rgba(0, 0, 0, .85);
}

.theater-image {
	width: 100%;
	height: 180px;
	object-fit: cover;
}

.theater-content {
	padding: 20px;
}

.theater-name {
	font-size: 1.2rem;
	font-weight: 700;
	margin-bottom: 8px;
}

.info-item {
	display: flex;
	gap: 10px;
	font-size: .85rem;
	color: var(--text-muted);
	margin-bottom: 10px;
}

.screen-count {
	display: inline-block;
	background: rgba(100, 150, 255, .15);
	color: var(--accent);
	padding: 6px 12px;
	border-radius: 8px;
	font-weight: 700;
	font-size: .8rem;
	margin-bottom: 15px;
}

/* ===== ACTIONS ===== */
.card-actions {
	display: grid;
	grid-template-columns: repeat(2, 1fr);
	gap: 8px;
}

.btn-action {
	padding: .5rem;
	font-size: .75rem;
	font-weight: 700;
	border-radius: 10px;
	text-decoration: none;
	text-align: center;
	transition: .3s;
}

.btn-edit {
	background: #2563eb;
	color: white;
}

.btn-edit:hover {
	background: #1d4ed8;
}

.btn-location {
	background: #475569;
	color: white;
}

.btn-location:hover {
	background: #334155;
}

.btn-screens {
	background: #f59e0b;
	color: #111827;
}

.btn-screens:hover {
	background: #d97706;
}

.btn-delete {
	background: rgba(255, 77, 109, .15);
	color: var(--danger);
	border: 1px solid var(--danger);
}

.btn-delete:hover {
	background: var(--danger);
	color: white;
}

/* ===== EMPTY STATE ===== */
.empty-state {
	text-align: center;
	padding: 90px 30px;
	background: linear-gradient(180deg, #111827, #0b1220);
	border: 1px solid var(--border);
	border-radius: 20px;
	box-shadow: 0 30px 70px rgba(0, 0, 0, .7);
}

.empty-state h2 {
	font-weight: 900;
	margin-bottom: 10px;
}

.empty-state p {
	color: var(--text-muted);
	margin-bottom: 25px;
}

/* ===== RESPONSIVE ===== */
@media ( max-width :768px) {
	.admin-header h1 {
		font-size: 1.5rem
	}
	.card-actions {
		grid-template-columns: 1fr
	}
}
</style>
</head>

<body>

	<nav class="navbar navbar-expand-lg">
		<div class="container-fluid">
			<a class="navbar-brand" href="/">🎬 BookMyTicket</a>
			<div class="collapse navbar-collapse">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link" href="/manage-users">Users</a></li>
					<li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<div class="admin-container">

		<div class="admin-header">
			<h1>🏛️ Manage Theaters</h1>
			<a href="/add-theater" class="add-btn">+ Add Theater</a>
		</div>

		<!-- EMPTY -->
		<div th:if="${theaters.isEmpty()}" class="empty-state">
			<h2>No Theaters Found</h2>
			<p>Add your first theater to start managing screens & shows.</p>
			<a href="/add-theater" class="add-btn">+ Add First Theater</a>
		</div>

		<!-- GRID -->
		<div th:if="${!theaters.isEmpty()}" class="theaters-grid">
			<div th:each="theater:${theaters}" class="theater-card">
				<img th:src="${theater.imageLocation}" class="theater-image">

				<div class="theater-content">
					<div class="theater-name" th:text="${theater.name}"></div>

					<div class="info-item">
						<span>📍</span> <span th:text="${theater.address}"></span>
					</div>

					<div class="screen-count"
						th:text="'Screens: '+${theater.screenCount}"></div>

					<div class="card-actions">
						<a th:href="'/edit-theater/'+${theater.id}"
							class="btn-action btn-edit">Edit</a> <a
							th:href="${theater.locationLink}" target="_blank"
							class="btn-action btn-location">Location</a> <a
							th:href="'/manage-screens/'+${theater.id}"
							class="btn-action btn-screens">Screens</a> <a
							th:href="'/delete-theater/'+${theater.id}"
							onclick="return confirm('Delete this theater?');"
							class="btn-action btn-delete">Delete</a>
					</div>
				</div>
			</div>
		</div>

	</div>

</body>
</html>
