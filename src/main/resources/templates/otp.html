<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Verify OTP | BookMyTicket</title>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #6496ff;
	--accent-pink: #ff4081;
}

/* ===== GLOBAL ===== */
body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-main);
}

/* ===== CARD ===== */
.otp-box {
	width: 100%;
	max-width: 420px;
	padding: 45px;
	background: linear-gradient(180deg, #111827, #0b1220);
	border-radius: 20px;
	border: 1px solid var(--border);
	box-shadow: 0 35px 80px rgba(0, 0, 0, .7);
	text-align: center;
	animation: fadeInUp .6s ease;
}

/* ===== TITLE ===== */
.otp-box h3 {
	font-weight: 900;
	font-size: 1.8rem;
	margin-bottom: 10px;
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	-webkit-background-clip: text;
	-webkit-text-fill-color: transparent;
}

.otp-box p {
	color: var(--text-muted);
	font-size: .95rem;
	margin-bottom: 28px;
}

/* ===== INPUT ===== */
.form-control {
	background: #020617;
	border: 1.5px solid var(--border);
	border-radius: 12px;
	padding: 14px 16px;
	color: var(--text-main);
	font-weight: 600;
	font-size: .95rem;
	text-align: center;
	letter-spacing: 3px;
	transition: .25s;
}

.form-control::placeholder {
	color: #64748b;
	letter-spacing: normal;
}

.form-control:focus {
	background: #020617;
	border-color: var(--accent);
	box-shadow: 0 0 0 3px rgba(100, 150, 255, .25);
	color: var(--text-main);
}

/* ===== BUTTON ===== */
.btn-primary {
	width: 100%;
	padding: 12px;
	border-radius: 12px;
	border: none;
	font-weight: 800;
	font-size: .9rem;
	background: linear-gradient(135deg, var(--accent), var(--accent-pink));
	box-shadow: 0 15px 35px rgba(100, 150, 255, .45);
	transition: .3s;
}

.btn-primary:hover {
	transform: translateY(-2px);
	box-shadow: 0 22px 50px rgba(100, 150, 255, .6);
}

/* ===== RESEND ===== */
.resend-section {
	margin-top: 22px;
}

.resend-link {
	color: var(--text-muted);
	font-weight: 600;
	font-size: .9rem;
	text-decoration: none;
	transition: .2s;
}

.resend-link:hover {
	color: var(--accent-pink);
}

/* ===== TOASTS ===== */
.toastify-container {
	position: fixed;
	top: 20px;
	right: 20px;
	z-index: 9999;
}

.toastify {
	min-width: 300px;
	border-radius: 12px;
	padding: 14px 18px;
	color: white;
	font-weight: 600;
	display: flex;
	align-items: center;
	gap: 12px;
	box-shadow: 0 15px 40px rgba(0, 0, 0, .6);
	animation: toastIn .4s ease forwards;
}

.toastify.success {
	background: linear-gradient(135deg, #22c55e, #16a34a);
}

.toastify.error {
	background: linear-gradient(135deg, #ff4081, #ff6a6a);
}

.toastify-close {
	width: 26px;
	height: 26px;
	border-radius: 50%;
	background: rgba(255, 255, 255, .25);
	border: none;
	color: white;
	font-size: 1.1rem;
	cursor: pointer;
	display: flex;
	align-items: center;
	justify-content: center;
	transition: .25s;
}

.toastify-close:hover {
	background: rgba(255, 255, 255, .4);
	transform: rotate(90deg);
}

/* ===== ANIMATIONS ===== */
@
keyframes toastIn {
	from {opacity: 0;
	transform: translateX(400px)
}

to {
	opacity: 1;
	transform: translateX(0)
}

}
@
keyframes toastOut {
	from {opacity: 1;
	transform: translateX(0)
}

to {
	opacity: 0;
	transform: translateX(400px)
}

}
@
keyframes fadeInUp {
	from {opacity: 0;
	transform: translateY(25px)
}

to {
	opacity: 1;
	transform: translateY(0)
}

}
@media ( max-width :480px) {
	.otp-box {
		padding: 35px
	}
}
</style>
</head>

<body>

	<!-- TOASTS -->
	<div class="toastify-container">
		<div th:if="${pass}" class="toastify success">
			<span th:text="${pass}"></span>
		</div>
		<div th:if="${fail}" class="toastify error">
			<span th:text="${fail}"></span>
		</div>
	</div>

	<!-- OTP CARD -->
	<div class="otp-box">
		<h3>Verify OTP</h3>
		<p>Enter the 6-digit OTP sent to your email</p>

		<form action="/otp" method="post">
			<input type="hidden" name="email" th:value="${email}">

			<div class="mb-3">
				<input type="number" name="otp" class="form-control"
					placeholder="Enter OTP" required>
			</div>

			<button class="btn btn-primary">Verify OTP</button>

			<div class="resend-section">
				<a th:href="'/resend-otp/'+${email}" class="resend-link">Resend
					OTP</a>
			</div>
		</form>
	</div>

	<script>
document.addEventListener("DOMContentLoaded",()=>{
	const toasts=document.querySelectorAll('.toastify');
	toasts.forEach(t=>{
		const btn=document.createElement('button');
		btn.className='toastify-close';
		btn.innerHTML='×';
		t.appendChild(btn);

		btn.onclick=()=>{
			t.style.animation='toastOut .3s ease forwards';
			setTimeout(()=>t.remove(),300);
		};

		setTimeout(()=>{
			if(document.body.contains(t)){
				t.style.animation='toastOut .3s ease forwards';
				setTimeout(()=>t.remove(),300);
			}
		},3500);
	});
});
</script>

</body>
</html>
