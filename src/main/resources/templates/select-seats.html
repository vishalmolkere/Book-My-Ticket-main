<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Select Seats | BookMyTicket</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap"
		rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

	<style>
		:root {
			--bg-main: #020617;
			--bg-card: #0f172a;
			--border: #1e293b;
			--text-main: #f8fafc;
			--text-muted: #94a3b8;
			--accent: #3b82f6;
			--accent-pink: #ec4899;
			--seat-standard: #334155;
			--seat-premium: #eab308;
			--seat-vip: #ec4899;
			--seat-selected: #22c55e;
			--seat-booked: #1e293b;
		}

		body {
			font-family: 'Poppins', sans-serif;
			background: radial-gradient(circle at top, #0f172a, var(--bg-main));
			min-height: 100vh;
			color: var(--text-main);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 40px 20px;
		}

		.theater-container {
			background: rgba(15, 23, 42, 0.7);
			backdrop-filter: blur(20px);
			border: 1px solid var(--border);
			border-radius: 24px;
			padding: 40px;
			box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
			max-width: 900px;
			width: 100%;
		}

		/* Screen */
		.screen-container {
			perspective: 1000px;
			margin-bottom: 60px;
		}

		.screen {
			background: linear-gradient(to bottom, rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.1));
			height: 80px;
			width: 100%;
			transform: rotateX(-45deg);
			box-shadow: 0 20px 50px rgba(255, 255, 255, 0.1);
			border-radius: 10px 10px 0 0;
			position: relative;
			border-top: 3px solid rgba(255, 255, 255, 0.8);
		}

		.screen::after {
			content: 'SCREEN THIS WAY';
			position: absolute;
			bottom: -30px;
			left: 50%;
			transform: translateX(-50%);
			font-weight: 700;
			letter-spacing: 4px;
			color: var(--text-muted);
			font-size: 0.85rem;
		}

		/* Seats Area */
		.seats-area {
			display: flex;
			flex-direction: column;
			align-items: center;
			gap: 12px;
		}

		.row-wrapper {
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.row-name {
			width: 40px;
			font-weight: 700;
			color: var(--text-muted);
			text-align: right;
			padding-right: 15px;
			font-size: 0.9rem;
		}

		.seats-row {
			display: flex;
			gap: 8px;
		}

		/* Seat */
		.seat {
			width: 38px;
			height: 38px;
			border-radius: 8px 8px 4px 4px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 0.75rem;
			font-weight: 700;
			cursor: pointer;
			user-select: none;
			transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			position: relative;
			color: rgba(255, 255, 255, 0.8);
			box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.3);
		}

		.seat::before {
			content: '';
			position: absolute;
			top: 4px;
			left: 4px;
			right: 4px;
			bottom: 8px;
			background: rgba(255, 255, 255, 0.1);
			border-radius: 4px;
		}

		.seat:hover:not(.booked) {
			transform: translateY(-4px) scale(1.05);
			box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.2), 0 10px 20px rgba(0, 0, 0, 0.4);
		}

		/* AISLE: Half on left, Half on right */
		.seat:nth-child(5) {
			margin-right: 40px;
		}

		/* Categories */
		.STANDARD {
			background: var(--seat-standard);
		}

		.PREMIUM {
			background: var(--seat-premium);
			color: #000;
		}

		.PREMIUM::before {
			background: rgba(0, 0, 0, 0.1);
		}

		.VIP {
			background: var(--seat-vip);
		}

		/* States */
		.booked {
			background: var(--seat-booked) !important;
			color: #334155;
			box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.5);
			cursor: not-allowed;
			opacity: 0.5;
		}

		.booked::before {
			display: none;
		}

		.selected {
			background: var(--seat-selected) !important;
			color: #fff;
			transform: translateY(-2px);
			box-shadow: inset 0 -4px 0 rgba(0, 0, 0, 0.2), 0 0 15px rgba(34, 197, 94, 0.5);
		}

		/* Legend */
		.legend {
			display: flex;
			gap: 25px;
			justify-content: center;
			margin-top: 45px;
			font-weight: 500;
			font-size: 0.9rem;
			background: rgba(0, 0, 0, 0.2);
			padding: 15px 30px;
			border-radius: 50px;
			flex-wrap: wrap;
		}

		.legend span {
			display: flex;
			align-items: center;
			gap: 8px;
			color: var(--text-muted);
		}

		.legend-box {
			width: 20px;
			height: 20px;
			border-radius: 6px;
			box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.3);
		}

		/* Footer Actions */
		.booking-footer {
			margin-top: 40px;
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding-top: 25px;
			border-top: 1px solid var(--border);
		}

		.price-info {
			display: flex;
			flex-direction: column;
		}

		.price-info span {
			color: var(--text-muted);
			font-size: 0.9rem;
		}

		.price-info strong {
			font-size: 1.5rem;
			font-weight: 800;
			color: var(--accent-pink);
		}

		.btn-proceed {
			background: linear-gradient(135deg, var(--accent), var(--accent-pink));
			border: none;
			padding: 12px 35px;
			font-weight: 700;
			border-radius: 12px;
			font-size: 1rem;
			box-shadow: 0 15px 30px rgba(236, 72, 153, 0.3);
			color: white;
			transition: 0.3s;
		}

		.btn-proceed:hover {
			transform: translateY(-2px);
			box-shadow: 0 20px 40px rgba(236, 72, 153, 0.4);
			color: white;
		}

		.btn-back {
			background: transparent;
			border: 1px solid var(--border);
			color: var(--text-main);
			padding: 12px 25px;
			font-weight: 600;
			border-radius: 12px;
		}

		.btn-back:hover {
			background: rgba(255, 255, 255, 0.05);
			color: white;
		}

		@media (max-width: 768px) {
			.seat {
				width: 28px;
				height: 28px;
				font-size: 0.65rem;
			}

			.seat:nth-child(5) {
				margin-right: 20px;
			}

			.theater-container {
				padding: 20px;
			}
		}
	</style>
</head>

<body>

	<div class="theater-container">

		<div class="screen-container">
			<div class="screen"></div>
		</div>

		<form action="/confirm-booking" method="post" onsubmit="return prepareSeats()">
			<input type="hidden" name="seatIds" id="seatIds">
			<input type="hidden" name="showId" th:value="${showId}">

			<div class="seats-area">
				<!-- ROW LOOP -->
				<div th:each="rowEntry : ${seatsByRow}" class="row-wrapper">
					<!-- Row Name -->
					<div class="row-name" th:text="${rowEntry.key}"></div>
					<!-- Seats -->
					<div class="seats-row">
						<div th:each="showSeat : ${rowEntry.value}" class="seat"
							th:classappend="${showSeat.seat.category} + (${showSeat.booked} ? ' booked' : '')"
							th:text="${showSeat.seat.seatColumn}" th:data-id="${showSeat.id}"
							onclick="toggleSeat(this)"></div>
					</div>
				</div>
			</div>

			<!-- Legend -->
			<div class="legend">
				<span>
					<div class="legend-box STANDARD"></div>Standard
				</span>
				<span>
					<div class="legend-box PREMIUM"></div>Premium
				</span>
				<span>
					<div class="legend-box VIP"></div>VIP
				</span>
				<span>
					<div class="legend-box booked"></div>Booked
				</span>
				<span>
					<div class="legend-box selected"></div>Selected
				</span>
			</div>

			<!-- Actions -->
			<div class="booking-footer">
				<a href="/" class="btn btn-back"><i class="bi bi-arrow-left"></i> Back</a>
				<div class="text-end">
					<button type="submit" class="btn btn-proceed">Proceed to Pay <i
							class="bi bi-arrow-right"></i></button>
				</div>
			</div>

		</form>
	</div>

	<script>
		function toggleSeat(el) {
			if (el.classList.contains('booked')) return;
			el.classList.toggle('selected');
		}

		function prepareSeats() {
			const selected = document.querySelectorAll('.seat.selected');
			if (selected.length === 0) {
				alert("Please select at least one seat to continue.");
				return false;
			}

			const seatIds = Array.from(selected)
				.map(seat => seat.dataset.id)
				.join(',');

			document.getElementById("seatIds").value = seatIds;
			return true;
		}
	</script>

</body>

</html>
