<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket - BookMyTicket</title>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="/favicon.svg">

<!-- Bootstrap -->
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
	rel="stylesheet">
<link
	href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap"
	rel="stylesheet">

<style>
:root {
	--bg-main: #0f172a;
	--bg-card: #111827;
	--border-soft: #1f2937;
	--text-main: #e5e7eb;
	--text-muted: #9ca3af;
	--accent: #e74c3c;
}

body {
	font-family: "Poppins", sans-serif;
	background: radial-gradient(circle at top, #1e293b, var(--bg-main));
	min-height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	color: var(--text-main);
	padding: 20px;
}

/* Ticket Card */
.ticket {
	width: 100%;
	max-width: 450px;
	background: #fff;
	border-radius: 20px;
	overflow: hidden;
	color: #111827;
	display: flex;
	flex-direction: column;
	box-shadow: 0 40px 80px rgba(0, 0, 0, 0.7);
	animation: fadeInUp 0.8s ease;
}

/* Ticket Header */
.ticket-header {
	background: linear-gradient(135deg, #e74c3c, #ff6b6b);
	color: white;
	padding: 25px;
	text-align: center;
}

.ticket-header h1 {
	font-weight: 900;
	font-size: 1.5rem;
	margin: 0;
}

.ticket-header p {
	font-size: 0.85rem;
	opacity: 0.9;
	margin-top: 5px;
	text-transform: uppercase;
	letter-spacing: 1px;
}

/* Ticket Body */
.ticket-body {
	padding: 30px;
	position: relative;
}

.info-item {
	margin-bottom: 20px;
}

.info-label {
	display: block;
	font-size: 0.75rem;
	font-weight: 700;
	color: #6b7280;
	text-transform: uppercase;
	letter-spacing: 1px;
	margin-bottom: 4px;
}

.info-value {
	font-size: 1.1rem;
	font-weight: 800;
	color: #111827;
}

.info-grid {
	display: grid;
	grid-template-columns: 1fr 1fr;
	gap: 20px;
}

.qr-section {
	text-align: center;
	padding-top: 20px;
	border-top: 2px dashed #e5e7eb;
}

.qr-box {
	width: 160px;
	height: 160px;
	margin: 0 auto;
	padding: 10px;
	background: #f3f4f6;
	border-radius: 12px;
}

.qr-box img {
	width: 100%;
	height: 100%;
}

.order-id {
	display: block;
	margin-top: 15px;
	font-family: monospace;
	font-size: 0.8rem;
	color: #6b7280;
}

/* Stub / Perforation Effect */
.stub-line {
	position: relative;
	height: 0;
	border-top: 2px dashed #e5e7eb;
	margin: 5px 0;
}

.stub-line::before, .stub-line::after {
	content: '';
	position: absolute;
	top: -10px;
	width: 20px;
	height: 20px;
	background: var(--bg-main);
	border-radius: 50%;
}

.stub-line::before { left: -40px; }
.stub-line::after { right: -40px; }

/* Buttons */
.ticket-actions {
	padding: 20px 30px 30px;
	display: flex;
	gap: 10px;
}

.btn-print {
	flex: 1;
	background: #111827;
	color: white;
	border: none;
	padding: 12px;
	border-radius: 12px;
	font-weight: 700;
}

.btn-home {
	flex: 1;
	background: #f3f4f6;
	color: #111827;
	border: none;
	padding: 12px;
	border-radius: 12px;
	font-weight: 700;
	text-decoration: none;
	text-align: center;
}

@keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

@media print {
	body { background: white; }
	.ticket-actions { display: none; }
	.ticket { box-shadow: none; border: 1px solid #eee; margin: 0 auto; }
}

</style>
</head>

<body>

	<div class="ticket">
		<div class="ticket-header">
			<h1>🎬 BOOK MY TICKET</h1>
			<p>Official Digital Receipt</p>
		</div>

		<div class="ticket-body">
			
			<div class="info-item">
				<span class="info-label">Movie Name</span>
				<div class="info-value" th:text="${ticket.movieName}">Avatar: The Way of Water</div>
			</div>

			<div class="info-grid">
				<div class="info-item">
					<span class="info-label">Theater</span>
					<div class="info-value" th:text="${ticket.theaterName}">PVR Cinemas</div>
				</div>
				<div class="info-item">
					<span class="info-label">Screen</span>
					<div class="info-value" th:text="${ticket.screenName}">Screen 1</div>
				</div>
			</div>

			<div class="info-grid">
				<div class="info-item">
					<span class="info-label">Date</span>
					<div class="info-value" th:text="${ticket.showDate}">2023-11-20</div>
				</div>
				<div class="info-item">
					<span class="info-label">Time</span>
					<div class="info-value" th:text="${ticket.showTiming}">18:00</div>
				</div>
			</div>

			<div class="info-item">
				<span class="info-label">Seats</span>
				<div class="info-value">
					<span th:each="seat, iter : ${ticket.seatNumber}" 
						  th:text="${seat} + (!${iter.last} ? ', ' : '')">A1, A2</span>
				</div>
			</div>

			<div class="stub-line"></div>

			<div class="qr-section">
				<div class="qr-box">
					<img th:src="${ticket.qrUrl}" alt="Ticket QR Code">
				</div>
				<span class="order-id" th:text="'Payment ID: ' + ${ticket.paymentId}">razorpay_order_12345</span>
			</div>

		</div>

		<div class="ticket-actions">
			<button onclick="window.print()" class="btn-print">Print Ticket</button>
			<a href="/" class="btn-home">Back to Home</a>
		</div>
	</div>

</body>
</html>
